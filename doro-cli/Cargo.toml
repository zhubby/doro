[package]
name = "doro-cli"
version = { workspace = true }
edition = "2024"

[[bin]]
name = "codex"
path = "src/main.rs"

[lib]
name = "codex_cli"
path = "src/lib.rs"

[lints]
workspace = true

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
doro-core = { workspace = true}
doro-common = {workspace = true ,  features = ["cli"] }
doro-exec = { workspace = true}
doro-login = { workspace = true}
doro-linux-sandbox = { workspace = true}
doro-mcp-server = { workspace = true}
doro-tui = { workspace = true}
serde_json = "1"
tokio = { version = "1", features = [
    "io-std",
    "macros",
    "process",
    "rt-multi-thread",
    "signal",
] }
tracing = "0.1.41"
tracing-subscriber = "0.3.19"
