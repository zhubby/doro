syntax = "proto3";

package doro.agent.v1;

import "google/protobuf/timestamp.proto";

service AgentControlPlane {
  rpc Enroll(EnrollRequest) returns (EnrollResponse);
  rpc ReportHeartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc OpenAgentStream(stream AgentEvent) returns (stream ControlPlaneCommand);
}

message EnrollRequest {
  string enrollment_token = 1;
  string hostname = 2;
  repeated AgentCapability capabilities = 3;
  string system_profile_json = 4;
}

message EnrollResponse {
  string agent_id = 1;
  string host_id = 2;
  string control_plane_id = 3;
}

message HeartbeatRequest {
  string agent_id = 1;
  string host_id = 2;
  google.protobuf.Timestamp observed_at = 3;
  repeated AgentCapability capabilities = 4;
}

message HeartbeatResponse {
  bool accepted = 1;
  string message = 2;
}

message AgentEvent {
  string event_id = 1;
  string agent_id = 2;
  string host_id = 3;
  google.protobuf.Timestamp recorded_at = 4;
  oneof event {
    ConnectedEvent connected = 5;
    HeartbeatEvent heartbeat = 6;
    MetricsSnapshotEvent metrics_snapshot = 7;
    ContainerSnapshotEvent container_snapshot = 8;
    CollectorErrorEvent collector_error = 9;
    CommandResultEvent command_result = 10;
    TerminalCommandResultEvent terminal_command_result = 11;
    TerminalOutputEvent terminal_output = 12;
    TerminalSessionClosedEvent terminal_session_closed = 13;
    LogLineEvent log_line = 14;
  }
}

message ControlPlaneCommand {
  string command_id = 1;
  google.protobuf.Timestamp issued_at = 2;
  oneof command {
    AckCommand ack = 3;
    CollectContainersCommand collect_containers = 4;
    ShutdownCommand shutdown = 5;
    RunTerminalCommandCommand run_terminal_command = 6;
    OpenTerminalSessionCommand open_terminal_session = 7;
    TerminalInputCommand terminal_input = 8;
    ResizeTerminalSessionCommand resize_terminal_session = 9;
    CloseTerminalSessionCommand close_terminal_session = 10;
  }
}

message AckCommand {
  string message = 1;
}

message CollectContainersCommand {
  string runtime = 1;
}

message ShutdownCommand {
  string reason = 1;
}

message RunTerminalCommandCommand {
  string command_id = 1;
  string input = 2;
  uint32 cols = 3;
  uint32 rows = 4;
  uint32 timeout_seconds = 5;
}

message OpenTerminalSessionCommand {
  string session_id = 1;
  uint32 cols = 2;
  uint32 rows = 3;
}

message TerminalInputCommand {
  string session_id = 1;
  string data = 2;
}

message ResizeTerminalSessionCommand {
  string session_id = 1;
  uint32 cols = 2;
  uint32 rows = 3;
}

message CloseTerminalSessionCommand {
  string session_id = 1;
  string reason = 2;
}

message ConnectedEvent {
  string protocol_version = 1;
  string hostname = 2;
}

message HeartbeatEvent {
  string protocol_version = 1;
}

message MetricsSnapshotEvent {
  string host_id = 1;
  google.protobuf.Timestamp captured_at = 2;
  float cpu_percent = 3;
  float memory_percent = 4;
  float disk_percent = 5;
  float load_average = 6;
  string extra_json = 7;
}

message ContainerSnapshotEvent {
  string command_id = 1;
  string runtime = 2;
  repeated ContainerObservation containers = 3;
  string extra_json = 4;
}

message ContainerObservation {
  string id = 1;
  repeated string names = 2;
  string image = 3;
  string image_id = 4;
  string command = 5;
  int64 created = 6;
  string ports_json = 7;
  string labels_json = 8;
  string state = 9;
  string status = 10;
}

message CollectorErrorEvent {
  string command_id = 1;
  string collector = 2;
  string message = 3;
}

enum CommandStatus {
  COMMAND_STATUS_UNSPECIFIED = 0;
  COMMAND_STATUS_SUCCEEDED = 1;
  COMMAND_STATUS_FAILED = 2;
}

message CommandResultEvent {
  string command_id = 1;
  CommandStatus status = 2;
  string message = 3;
}

message TerminalCommandResultEvent {
  string command_id = 1;
  CommandStatus status = 2;
  string output = 3;
  int32 exit_code = 4;
  google.protobuf.Timestamp started_at = 5;
  google.protobuf.Timestamp finished_at = 6;
}

message TerminalOutputEvent {
  string session_id = 1;
  string data = 2;
}

message TerminalSessionClosedEvent {
  string session_id = 1;
  string reason = 2;
}

message LogLineEvent {
  string log_id = 1;
  string level = 2;
  string target = 3;
  string message = 4;
  string fields_json = 5;
}

message AgentCapability {
  string name = 1;
  string risk = 2;
  string description = 3;
}
